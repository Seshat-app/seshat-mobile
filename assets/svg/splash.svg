<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <!-- Splash for the largest iPhone (1290x2796 = iPhone 15 Pro Max).
       The OS scales down to smaller devices automatically. Designed so
       the mark + wordmark sit centered ~38% from top, with breathing
       room below for the "Loading" feel even though no actual indicator. -->
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0" stop-color="#15151A"/>
      <stop offset="0.55" stop-color="#0C0C0E"/>
      <stop offset="1" stop-color="#050507"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8C97A"/>
      <stop offset="0.55" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#8B6B14"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#C9A84C" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="boneFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8E8E0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#E8E8E0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E8E8E0" stop-opacity="0"/>
    </linearGradient>

    <!-- Filter for the soft outer glow on the blip -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1290" height="2796" fill="url(#bg)"/>

  <!-- Subtle decorative concentric arcs in the background for depth -->
  <g transform="translate(645 1100)" opacity="0.10">
    <circle cx="0" cy="0" r="650" fill="none" stroke="#E8E8E0" stroke-width="1"/>
    <circle cx="0" cy="0" r="850" fill="none" stroke="#E8E8E0" stroke-width="1"/>
    <circle cx="0" cy="0" r="1050" fill="none" stroke="#E8E8E0" stroke-width="1"/>
  </g>

  <!-- Hairlines crossing through the mark to break up the negative space -->
  <line x1="0" y1="1100" x2="1290" y2="1100" stroke="url(#boneFade)" stroke-width="1"/>
  <line x1="645" y1="450" x2="645" y2="1750" stroke="url(#boneFade)" stroke-width="1"/>

  <!-- Main radar mark (centered at y=1100, larger than the icon) -->
  <g transform="translate(645 1100)">
    <!-- Soft glow under the mark -->
    <circle cx="0" cy="0" r="320" fill="#C9A84C" opacity="0.08" filter="url(#glow)"/>

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="380" fill="none"
            stroke="rgba(232,232,224,0.35)" stroke-width="3"/>
    <!-- Active arc top-right -->
    <path d="M 380 0 A 380 380 0 0 0 0 -380"
          fill="none" stroke="url(#gold)" stroke-width="6"
          stroke-linecap="round" opacity="0.9"/>

    <!-- Wedge -->
    <path d="M 0 0 L 380 0 A 380 380 0 0 0 268.7 -268.7 Z"
          fill="url(#gold)" opacity="0.16"/>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="190" fill="none"
            stroke="rgba(232,232,224,0.30)" stroke-width="3"/>
    <path d="M 190 0 A 190 190 0 0 0 0 -190"
          fill="none" stroke="url(#gold)" stroke-width="5"
          stroke-linecap="round" opacity="0.9"/>

    <!-- Crosshair -->
    <line x1="-380" y1="0" x2="380" y2="0"
          stroke="rgba(232,232,224,0.18)" stroke-width="2"/>
    <line x1="0" y1="-380" x2="0" y2="380"
          stroke="rgba(232,232,224,0.18)" stroke-width="2"/>

    <!-- Center + blip -->
    <circle cx="0" cy="0" r="7" fill="#E8E8E0"/>
    <circle cx="268.7" cy="-268.7" r="50" fill="url(#gold)" opacity="0.22"/>
    <circle cx="268.7" cy="-268.7" r="25" fill="url(#gold)" opacity="0.55"/>
    <circle cx="268.7" cy="-268.7" r="12" fill="#F4E3B6"/>
  </g>

  <!-- Wordmark below the mark -->
  <g transform="translate(645 1700)">
    <text x="0" y="0"
          font-family="Syne, system-ui, -apple-system, sans-serif"
          font-weight="700"
          font-size="120"
          letter-spacing="14"
          text-anchor="middle"
          fill="#E8E8E0">SESHAT</text>
    <!-- Hairline below the wordmark -->
    <line x1="-160" y1="40" x2="160" y2="40" stroke="url(#goldFade)" stroke-width="2"/>
    <!-- Tagline -->
    <text x="0" y="100"
          font-family="-apple-system, system-ui, sans-serif"
          font-weight="400"
          font-size="38"
          letter-spacing="10"
          text-anchor="middle"
          fill="rgba(232,232,224,0.55)">AI FINANCE COACH</text>
  </g>
</svg>
